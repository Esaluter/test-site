<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake — Жека</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="game-shell">
    <a class="back-link" href="../index.html">← Назад в портфолио</a>

    <section class="glass panel header-panel">
      <div>
        <p class="eyebrow">Mini Game</p>
        <h1>Snake</h1>
        <p class="subtitle">Играй прямо на сайте. Управление: стрелки или WASD.</p>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="label">Счёт</span>
          <span id="score">0</span>
        </div>
        <div class="stat">
          <span class="label">Рекорд</span>
          <span id="best">0</span>
        </div>
      </div>
    </section>

    <section class="glass panel game-panel">
      <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>

      <div class="controls">
        <button id="startBtn" class="btn primary">Старт</button>
        <button id="restartBtn" class="btn">Рестарт</button>
      </div>

      <p class="hint">
        На телефоне можно играть кнопками ниже.
      </p>

      <div class="mobile-controls">
        <button class="control-btn" data-dir="up">↑</button>
        <div class="middle-row">
          <button class="control-btn" data-dir="left">←</button>
          <button class="control-btn" data-dir="down">↓</button>
          <button class="control-btn" data-dir="right">→</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
